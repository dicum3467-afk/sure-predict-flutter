name: Safe Sync

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Call backend safe sync
        run: |
          curl -X POST "https://sure-predict-backend.onrender.com/fixtures/admin-sync?season=2025&next_count=10&days_ahead=7&past_days=3" \
            -H "X-Sync-Token: surepredict123"
