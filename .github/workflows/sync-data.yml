name: Sync Football Data

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Run data pipeline
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          FOOTBALL_API_BASE_URL: ${{ secrets.FOOTBALL_API_BASE_URL }}
          FOOTBALL_API_KEY: ${{ secrets.FOOTBALL_API_KEY }}
        run: |
          cd backend
          python -m app.jobs.run_daily_pipeline
